services:
  postgres:
    image: postgres:16-alpine
    container_name: image-2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: image2
      POSTGRES_USER: image2
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U image2 -d image2"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  image-2-studio:
    image: ${IMAGE_NAME:-ghcr.io/pairmeng/image-2-studio}:${IMAGE_TAG:-latest}
    pull_policy: always
    container_name: image-2-studio
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: postgresql://image2:${POSTGRES_PASSWORD:-change-me}@postgres:5432/image2?schema=public
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

volumes:
  postgres-data:
